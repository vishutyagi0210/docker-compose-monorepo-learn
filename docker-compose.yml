version: "3.8"
name: "monorepo-dc"

services:

  frontend:
    build:
      context: ./
      dockerfile: docker/Dockerfile.frontend
      args:
        DATABASE_URL: ${DATABASE_URL}
    ports:
      - 3000:3000
    environment:
      DATABASE_URL: ${DATABASE_URL}
  http-backend:
    build:
      context: ./
      dockerfile: docker/Dockerfile.http-backend
    ports:
      - 8080:8080
    environment:
      DATABASE_URL: ${DATABASE_URL}
  ws-backend:
    build: 
      context: ./
      dockerfile: docker/Dockerfile.ws-backend
    ports:
      - 8081:8081
    environment:
      DATABASE_URL: ${DATABASE_URL}